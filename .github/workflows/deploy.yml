name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # No cache: avoids E401 from cached auth. Public registry forced in Install step.

      - name: Install dependencies
        run: npm ci --registry https://registry.npmjs.org/
        env:
          NPM_CONFIG_REGISTRY: https://registry.npmjs.org/
          # Unset token so npm doesn't try to auth (fixes E401 when org has npm auth enabled)
          NPM_TOKEN: ""
          NPM_AUTH_TOKEN: ""

      - name: Show npm debug log (on failure)
        if: failure()
        run: |
          echo "=== npm debug log ==="
          cat /home/runner/.npm/_logs/*.log 2>/dev/null || echo "No log file found"

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
